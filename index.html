<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASN Lead Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ALL YOUR ORIGINAL CSS FROM asn-leads-fixed2.html - PASTE ENTIRE STYLE BLOCK HERE */
        /* For brevity in this response, I'm summarizing - COPY YOUR FULL CSS FROM ORIGINAL FILE */
        :root { --accent: #2d7ef7; --green: #16a34a; --red: #dc2626; /* etc. all vars */ }
        .ef-card { /* all your .ef-card, .ap-table, etc. classes */ }
        /* PASTE COMPLETE <style> from your asn-leads-fixed2.html here */
        
        /* NEW: Proxy status */
        .proxy-status { font-size: 10px; color: var(--green); }
        .proxy-status.error { color: var(--red); }
        .cloud-403-hint { color: var(--red); font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <!-- ALL YOUR ORIGINAL HTML STRUCTURE - PASTE COMPLETE BODY FROM asn-leads-fixed2.html -->
    <!-- Sidebar, topbar, tabs, forms, tables, modals - UNCHANGED -->
    
    <!-- KEY: Cloud Settings Button (already in your file) -->
    <div class="crm-config-panel" id="crm-config-panel">
        <!-- Your CRM fields -->
        <input type="password" id="method-api-key-input" placeholder="method-xxxxxxxxxxxx">
        <input type="text" id="method-proxy-url-input" placeholder="https://your-worker.workers.dev/">
        <button onclick="testMethodConnection()">Test Connection</button>
        <div id="method-test-result"></div>
    </div>

    <!-- Cloud Setup Modal (enhanced) -->
    <div id="cloud-setup-modal" style="display:none;">
        <!-- Your existing modal HTML with these ID updates: cs-bin-id, cs-read-key, cs-master-key -->
    </div>

    <script>
        // ===================== ALL FIXED JAVASCRIPT =====================
        // 1. CRM VARS + FIXED methodFetch
        let methodApiKey = localStorage.getItem('asn-method-apikey') || '';
        let methodProxyUrl = localStorage.getItem('asn-method-proxyurl') || 'https://api.allorigins.win/raw?url=';

        async function methodFetch(endpoint, method = 'GET', options = {}) {
            const url = methodProxyUrl ? `${methodProxyUrl}${encodeURIComponent('https://rest.method.me' + endpoint)}` : `https://rest.method.me${endpoint}`;
            const headers = {
                'APIKey': methodApiKey,  // ✅ FIXED: Method uses APIKey (not Bearer)
                'Content-Type': 'application/json',
                ...options.headers
            };
            try {
                const res = await fetch(url, { method, headers, body: options.body });
                if (!res.ok) {
                    const errText = await res.text().catch(() => 'Unknown');
                    if (res.status === 401 || res.status === 403) throw new Error('Invalid API key');
                    throw new Error(`HTTP ${res.status}: ${errText.slice(0,100)}`);
                }
                return res;
            } catch (e) {
                if (e.message.includes('CORS') && !methodProxyUrl) {
                    methodProxyUrl = 'https://api.allorigins.win/raw?url=';
                    localStorage.setItem('asn-method-proxyurl', methodProxyUrl);
                    toast('Auto-set CORS proxy. Retrying...', 'info');
                    return methodFetch(endpoint, method, options);
                }
                throw e;
            }
        }

        async function createMethodContact(lead) {
            if (!methodApiKey) return;
            try {
                const payload = { FirstName: lead.first, LastName: lead.last, Email: lead.email, Phone: lead.phone };
                const res = await methodFetch('/api/v1/contacts', 'POST', { body: JSON.stringify(payload) });
                const data = await res.json();
                lead.crmSynced = true;
                toast('Synced to Method CRM ✓', 'success');
            } catch (e) {
                toast('CRM: ' + e.message, 'error');
            }
        }

        async function testMethodConnection() {
            const el = document.getElementById('method-test-result');
            el.style.display = 'block'; el.textContent = 'Testing...';
            try {
                await methodFetch('/api/v1/contacts?$top=1');
                el.textContent = '✅ Connected!'; el.classList.add('proxy-status');
            } catch (e) {
                el.textContent = '❌ ' + e.message; el.classList.add('proxy-status', 'error');
            }
        }

        // 2. CLOUD VARS + FIXED 403 HANDLING
        function getBinId() { return localStorage.getItem('asnbinid') || EMBEDDEDBINID || ''; }
        function getReadKey() { return localStorage.getItem('asnreadkey') || EMBEDDEDREADKEY || ''; }
        function getMasterKey() { return localStorage.getItem('asnmasterkey') || EMBEDDEDWRITEKEY || ''; }

        // ✅ FIXED cloudSave - Better 403 detection
        async function cloudSave() {
            if (!getBinId()) return;
            showCloudStatus('saving', 'Saving...');
            try {
                const data = { leads, /* all your data objects */ lastSaved: new Date().toISOString() };
                const res = await fetch(`https://api.jsonbin.io/v3/b/${getBinId()}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': getMasterKey() },
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const err = await res.text();
                    if (res.status === 403) throw new Error('**MASTER KEY INVALID** - Open Cloud → Copy FRESH MASTER KEY');
                    throw new Error(`HTTP ${res.status}: ${err.slice(0,100)}`);
                }
                showCloudStatus('ok', 'Saved ✓');
            } catch (e) {
                showCloudStatus('error', 'Save failed');
                if (e.message.includes('403') || e.message.includes('MASTER')) {
                    toast(e.message + ' Data local only.', 'error', 8000);
                    openCloudSetup();
                }
            }
        }

        // ✅ FIXED pushLocalToCloud - WRITE TEST FIRST
        async function pushLocalToCloud() {
            if (!getMasterKey()) { openCloudSetup(); return; }
            
            // PRE-TEST WRITE
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${getBinId()}`, { 
                    method: 'PUT', headers: { 'X-Master-Key': getMasterKey() } 
                });
            } catch (e) {
                toast('**403 TEST FAILED** - Fix MASTER KEY first.', 'error');
                openCloudSetup();
                return;
            }
            
            // Push logic (your original + updated in-memory)
            const localLeads = JSON.parse(localStorage.getItem('asnleads') || '[]');
            // ... other locals
            if (!confirm('Push local data to cloud? **Replaces cloud.**')) return;
            
            const data = { leads: localLeads /* + all */ };
            await fetch(`https://api.jsonbin.io/v3/b/${getBinId()}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': getMasterKey() },
                body: JSON.stringify(data)
            });
            leads = localLeads; // Update local state
            renderAll();
            toast('✅ PUSHED! All users see data now.', 'success');
        }

        // ✅ FIXED testCloudConnection - Tests WRITE now
        async function testCloudConnection() {
            const el = document.getElementById('cloud-test-result');
            el.style.display = 'block'; el.textContent = 'Testing **WRITE**...';
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${getBinId()}`, {
                    method: 'PUT', headers: { 'X-Master-Key': getMasterKey() }
                });
                el.textContent = res.ok ? '✅ **WRITE OK!** Ready to push.' : '❌ HTTP ' + res.status;
                el.style.color = res.ok ? 'var(--green)' : 'var(--red)';
            } catch (e) {
                el.textContent = '❌ ' + e.message; el.style.color = 'var(--red)';
            }
        }

        // 3. YOUR ORIGINAL FUNCTIONS (UNCHANGED)
        // pasteLeads(), renderRecentLeads(), switchTab(), toast(), etc.
        // ALL your existing functions here - they work with fixes above

        // 4. INIT (add these calls)
        function init() {
            initCrmKeyState();
            checkLocalDataMigration();
            renderAll();
        }
        window.onload = init;
    </script>
</body>
</html>
